

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - medical_network

  nginx:
    image: nginx:latest
    container_name: medical_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - medical_network

  postgres:
    image: postgres:16
    container_name: medical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medical_dev
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medical_network

  redis:
    image: redis:7
    container_name: medical_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medical_network

  mailpit:
    image: axllent/mailpit
    container_name: medical_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - medical_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: medical_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - medical_network

networks:
  medical_network:
    driver: bridge

volumes:
  postgres_data: